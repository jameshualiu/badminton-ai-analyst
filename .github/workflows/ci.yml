name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Check the Backend
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: backend
      # Note: We can add 'npm test' here once we have backend tests!

  # Job 2: Check the Frontend
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/badminton-ai/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: frontend/badminton-ai
      - name: Run Linting
        run: npm run lint
        working-directory: frontend/badminton-ai
      - name: Run Type-Checking
        run: npx tsc -b
        working-directory: frontend/badminton-ai
