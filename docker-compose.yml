services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development

  frontend:
    build:
      context: ./frontend/badminton-ai
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/badminton-ai:/app
      # "The Professional Fix": Use a named volume for node_modules.
      # This keeps node_modules inside Docker's private storage so Mac
      # permissions don't mess with it.
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/badminton-ai/.env.local
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api

# Define the named volume here
volumes:
  frontend_node_modules:
